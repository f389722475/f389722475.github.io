name: Deploy to GitHub Pages

on:
    push:
        branches: [main, master]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        name: Build site
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 10.22.0
                  run_install: false

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22"
                  cache: pnpm
                  cache-dependency-path: pnpm-lock.yaml

            - name: Configure GitHub Pages
              uses: actions/configure-pages@v5

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Validate articles and images
              run: pnpm run content:check

            - name: Build site
              run: pnpm run build
              env:
                  ENABLE_CONTENT_SYNC: "false"
                  SITE_URL: ${{ vars.SITE_URL }}
                  BASE_PATH: ${{ vars.BASE_PATH }}
                  BILI_SESSDATA: ${{ secrets.BILI_SESSDATA }}
                  PUBLIC_SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
                  PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

            - name: Sync articles and media to Supabase
              if: ${{ vars.SUPABASE_BACKEND_READY == 'true' }}
              run: pnpm run supabase:sync-content
              env:
                  SUPABASE_URL: ${{ vars.PUBLIC_SUPABASE_URL }}
                  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

            - name: Upload GitHub Pages artifact
              uses: actions/upload-pages-artifact@v4
              with:
                  path: dist

    deploy:
        name: Deploy site
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
